name: Synthetic Monitor

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run smoke checks
        env:
          PROTOCOL_ADMIN_PIN: ${{ secrets.PROTOCOL_ADMIN_PIN }}
        run: python delx-mcp-server/scripts/api_monitor.py --mode smoke --base https://api.delx.ai
