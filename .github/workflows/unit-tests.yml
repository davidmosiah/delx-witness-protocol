name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: delx-mcp-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: delx-mcp-server/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Ruff check (strict on new thin modules)
        run: |
          ruff check app_context.py tool_catalog.py caller_fingerprint.py

      - name: Ruff check (extracted packages — report only until clean)
        run: |
          ruff check discovery_payloads.py response_contracts.py rewards_logic.py \
            mcp_dispatch.py mcp_tools.py asgi_composite.py routes therapy_engine \
            || echo "::warning::ruff findings remain on large move-only extracts; strict gate covers thin modules"

      - name: Mypy (typed extract modules)
        run: |
          mypy --config-file pyproject.toml \
            app_context.py tool_catalog.py discovery_payloads.py \
            response_contracts.py caller_fingerprint.py

      - name: Unittest suite
        run: python -m unittest discover -s tests -p 'test_*.py' -v
