name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: delx-mcp-server
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: delx-mcp-server/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip check

      - name: Ruff check
        run: ruff check .

      - name: Mypy (typed extract modules)
        run: |
          mypy --config-file pyproject.toml \
            app_context.py tool_catalog.py discovery_payloads.py \
            response_contracts.py caller_fingerprint.py

      - name: Unittest suite
        run: python -m unittest discover -s tests -p 'test_*.py' -v
